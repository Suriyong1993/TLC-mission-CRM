let active = "dashboard";

function renderTabs() {
  const el = document.getElementById("tabs");
  el.innerHTML = MODULES.map(m => `
    <button class="tab ${m.id === active ? 'active' : ''}" onclick="setActive('${m.id}')">
      ${m.icon} ${m.title}
    </button>
  `).join("");
}

function renderContent() {
  const m = MODULES.find(x => x.id === active);
  const colorMap = {
    blue: "#185FA5", teal: "#0F6E56", purple: "#534AB7",
    amber: "#854F0B", red: "#A32D2D", coral: "#993C1D"
  };
  const bgMap = {
    blue: "#E6F1FB", teal: "#E1F5EE", purple: "#EEEDFE",
    amber: "#FAEEDA", red: "#FCEBEB", coral: "#FAECE7"
  };
  const c = colorMap[m.color] || "#185FA5";
  const bg = bgMap[m.color] || "#E6F1FB";

  document.getElementById("content").innerHTML = `
    <div class="card">
      <div class="card-head">
        <div style="width:36px;height:36px;border-radius:var(--border-radius-md);background:${bg};display:flex;align-items:center;justify-content:center;font-size:18px;color:${c};flex-shrink:0;">${m.icon}</div>
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            <span style="font-size:15px;font-weight:500;color:var(--color-text-primary);">Module ${m.num} — ${m.title}</span>
            <span class="badge" style="background:${bg};color:${c};">${m.screens[0]}</span>
          </div>
          <div class="goal-row" style="margin-top:4px;">${m.goal}</div>
        </div>
      </div>
      <div class="card-body">
        <div>
          <div class="section-label">components ที่ prompt ครอบคลุม</div>
          <div class="chip-row">
            ${m.components.map(c2 => `<span class="chip">${c2}</span>`).join("")}
          </div>
        </div>
        <div>
          <div class="section-label">stitch prompt — copy ทั้งหมดไปวางใน stitch.withgoogle.com</div>
          <div class="prompt-box" id="pb-${m.id}"><button class="copy-btn" onclick="copyPrompt('${m.id}')">copy</button>${escHtml(m.prompt)}</div>
        </div>
        <div class="note">วางใน Stitch → New Design → paste prompt → Generate → ได้ UI mockup ทันที · จากนั้น export เป็น React code หรือ screenshot เพื่อ handoff</div>
      </div>
    </div>
  `;
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function setActive(id) {
  active = id;
  renderTabs();
  renderContent();
}

function copyPrompt(id) {
  const m = MODULES.find(x => x.id === id);
  navigator.clipboard.writeText(m.prompt).then(() => {
    const btn = document.querySelector(`#pb-${id} .copy-btn`);
    btn.textContent = "copied!";
    setTimeout(() => { btn.textContent = "copy"; }, 1800);
  });
}

renderTabs();
renderContent();
</script>
